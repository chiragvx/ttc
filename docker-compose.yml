# The wedge stack on one box: backend (API + SPA + solvers) + Dramatiq worker + Redis + Postgres.
#   docker compose up --build   ->   open http://localhost:8000
# The backend serves the built SPA from the same origin (no proxy); the worker runs FS analysis jobs;
# verdicts + events persist in Postgres (survive `docker compose restart`).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: cad
      POSTGRES_DB: cad
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cad"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    image: ttc-app
    environment:
      DATABASE_URL: postgresql://postgres:cad@postgres:5432/cad
      REDIS_URL: redis://redis:6379/0
      # Unset by default = every session/endpoint is open to anyone who can reach :8000 (this compose
      # file binds 0.0.0.0). Set AUTH_TOKEN in a `.env` file next to this one (see .env.example) before
      # exposing this beyond localhost. Docker Compose reads `.env` automatically for this substitution.
      AUTH_TOKEN: ${AUTH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/app          # use host code (dist is baked at build time, served from here)

  worker:
    image: ttc-app
    # 1 process: FS analysis is heavy, and it avoids the CREATE-TABLE-IF-NOT-EXISTS race storm
    command: ["dramatiq", "packages.truth_plane.worker", "--processes", "1", "--threads", "2"]
    environment:
      DATABASE_URL: postgresql://postgres:cad@postgres:5432/cad
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  pgdata:
